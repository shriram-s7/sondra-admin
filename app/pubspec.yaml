name: sondra
description: A personal music streaming platform app targeting Android and Windows.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Audio Playback & Service
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  
  # HTTP Client
  dio: ^5.4.0
  
  # Local Storage & Caching
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  
  # Windows Media Controls Integration
  smtc_windows: ^0.1.3
  
  # Icon sets
  cupertino_icons: ^1.0.6
  just_audio_windows: ^0.2.3

  # Local file system & path utilities
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
